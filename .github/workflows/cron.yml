name: Run Research Agent

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openai/gpt-4o-mini
        run: python main.py

      - name: Fix git safe directory
        run: git config --global --add safe.directory /github/workspace

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Ensure latest.json exists with valid empty structure
          mkdir -p data
          if [ ! -f "data/latest.json" ] || [ $(wc -c < "data/latest.json") -lt 2 ]; then
            echo '{"generated_at":""}' > data/latest.json
          fi

          git add data/*
          git commit -m "update reports" || echo "No changes"

          git pull --rebase origin main

          # Push with retries to handle transient GitHub issues
          for i in 1 2 3; do
            if git push origin main; then
              break
            fi
            sleep 5
          done

          # Wait for GitHub to process the update
          sleep 10